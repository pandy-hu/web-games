<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>五子棋 · Gomoku</title>
<style>
:root{--bg:#f4f5f9;--card:#fff;--text:#1f2430;--sub:#7b8190;--accent:#4f46e5;--soft:#eef2ff;--shadow:0 1px 3px rgba(20,20,40,.06),0 6px 18px rgba(20,20,40,.05);--board:#e3b96b;--line:#9c7838;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding:18px 16px 40px}
.bar a{color:var(--sub);text-decoration:none;font-size:14px}
h1{font-size:20px;margin-top:2px}.sub{color:var(--sub);font-size:13px}
.card{background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-top:14px}
.status{text-align:center;font-weight:700;font-size:15px;min-height:22px;margin-bottom:10px}
canvas{display:block;width:100%;height:auto;background:var(--board);border-radius:10px;touch-action:manipulation}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:10px}
.btn{border:0;background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:10px 16px;border-radius:10px;cursor:pointer}
.btn.ghost{background:var(--soft);color:var(--accent)}
.score{display:flex;justify-content:space-around;text-align:center;margin-top:6px}
.score b{font-size:18px;display:block}.score span{color:var(--sub);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar"><a href="index.html">← 游戏厅</a></div>
  <h1>⚫ 五子棋 Gomoku</h1>
  <p class="sub">你执黑先行，点交叉点落子，先连成五子者胜。</p>

  <div class="card">
    <div class="status" id="status">你的回合（黑棋）</div>
    <canvas id="cv" width="450" height="450"></canvas>
    <div class="score">
      <div><b id="sw">0</b><span>你胜</span></div>
      <div><b id="sl">0</b><span>AI 胜</span></div>
    </div>
    <div class="row">
      <button class="btn ghost" id="undo">悔棋</button>
      <button class="btn" id="restart">重新开始</button>
    </div>
  </div>
</div>
<script>
const N=15,cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const SIZE=cv.width,PAD=15,GAP=(SIZE-PAD*2)/(N-1);
let board,over,turn,history,sc={w:0,l:0};
const statusEl=document.getElementById('status');

function reset(){board=Array.from({length:N},()=>Array(N).fill(0));over=false;turn=1;history=[];draw();statusEl.textContent='你的回合（黑棋）';}
function draw(){
  ctx.fillStyle='#e3b96b';ctx.fillRect(0,0,SIZE,SIZE);
  ctx.strokeStyle='#9c7838';ctx.lineWidth=1;
  for(let i=0;i<N;i++){
    ctx.beginPath();ctx.moveTo(PAD,PAD+i*GAP);ctx.lineTo(SIZE-PAD,PAD+i*GAP);ctx.stroke();
    ctx.beginPath();ctx.moveTo(PAD+i*GAP,PAD);ctx.lineTo(PAD+i*GAP,SIZE-PAD);ctx.stroke();
  }
  // 星位
  [[3,3],[3,11],[11,3],[11,11],[7,7]].forEach(([r,c])=>{ctx.fillStyle='#5f4a22';ctx.beginPath();ctx.arc(PAD+c*GAP,PAD+r*GAP,3,0,Math.PI*2);ctx.fill();});
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(board[r][c])stone(r,c,board[r][c]);
}
function stone(r,c,p){
  const x=PAD+c*GAP,y=PAD+r*GAP;
  ctx.beginPath();ctx.arc(x,y,GAP*0.42,0,Math.PI*2);
  const g=ctx.createRadialGradient(x-4,y-4,2,x,y,GAP*0.42);
  if(p===1){g.addColorStop(0,'#555');g.addColorStop(1,'#000');}else{g.addColorStop(0,'#fff');g.addColorStop(1,'#cfcfcf');}
  ctx.fillStyle=g;ctx.fill();
}
function place(r,c,p){board[r][c]=p;history.push([r,c]);draw();}
function win(r,c,p){
  const dirs=[[1,0],[0,1],[1,1],[1,-1]];
  for(const [dr,dc] of dirs){
    let cnt=1;
    for(let s=1;s<5;s++){const nr=r+dr*s,nc=c+dc*s;if(nr<0||nc<0||nr>=N||nc>=N||board[nr][nc]!==p)break;cnt++;}
    for(let s=1;s<5;s++){const nr=r-dr*s,nc=c-dc*s;if(nr<0||nc<0||nr>=N||nc>=N||board[nr][nc]!==p)break;cnt++;}
    if(cnt>=5)return true;
  }
  return false;
}
cv.addEventListener('click',e=>{
  if(over||turn!==1)return;
  const rect=cv.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(SIZE/rect.width),y=(e.clientY-rect.top)*(SIZE/rect.height);
  const c=Math.round((x-PAD)/GAP),r=Math.round((y-PAD)/GAP);
  if(r<0||c<0||r>=N||c>=N||board[r][c])return;
  place(r,c,1);
  if(win(r,c,1)){over=true;sc.w++;document.getElementById('sw').textContent=sc.w;statusEl.textContent='🎉 你赢了！';return;}
  turn=2;statusEl.textContent='AI 思考中…';
  setTimeout(aiMove,250);
});
// 启发式 AI：对每个空点评估「我方连子 + 阻挡对方」得分
function score1(r,c,p){
  const dirs=[[1,0],[0,1],[1,1],[1,-1]];let total=0;
  for(const [dr,dc] of dirs){
    let cnt=1,open=0;
    let s=1;for(;s<5;s++){const nr=r+dr*s,nc=c+dc*s;if(nr<0||nc<0||nr>=N||nc>=N)break;if(board[nr][nc]===p)cnt++;else{if(board[nr][nc]===0)open++;break;}}
    for(s=1;s<5;s++){const nr=r-dr*s,nc=c-dc*s;if(nr<0||nc<0||nr>=N||nc>=N)break;if(board[nr][nc]===p)cnt++;else{if(board[nr][nc]===0)open++;break;}}
    total+=Math.pow(cnt,4)+open*2+(cnt>=5?1000000:0);
  }
  return total;
}
function aiMove(){
  let best=-1,move=null;
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(board[r][c])continue;
    // 只考虑已有棋子附近，加速
    if(!near(r,c)&&history.length>0)continue;
    const atk=score1(r,c,2)*1.05;      // 自己进攻略优先
    const def=score1(r,c,1);           // 阻挡对手
    const s=Math.max(atk,def)+Math.random();
    if(s>best){best=s;move=[r,c];}
  }
  if(!move)move=[7,7];
  const [r,c]=move;place(r,c,2);
  if(win(r,c,2)){over=true;sc.l++;document.getElementById('sl').textContent=sc.l;statusEl.textContent='AI 赢了，再来一局？';return;}
  turn=1;statusEl.textContent='你的回合（黑棋）';
}
function near(r,c){
  for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nc>=0&&nr<N&&nc<N&&board[nr][nc])return true;}
  return false;
}
document.getElementById('undo').onclick=()=>{
  if(over||history.length<2)return;
  for(let i=0;i<2;i++){const [r,c]=history.pop();board[r][c]=0;}
  turn=1;over=false;draw();statusEl.textContent='你的回合（黑棋）';
};
document.getElementById('restart').onclick=reset;
reset();
</script>
</body></html>
