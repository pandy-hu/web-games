<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1,user-scalable=no">
<title>贪吃蛇</title>
<style>
:root{--bg:#f4f5f9;--card:#fff;--text:#1f2430;--sub:#7b8190;--accent:#4f46e5;--soft:#eef2ff;--line:#ebedf2;--shadow:0 1px 3px rgba(20,20,40,.06),0 6px 18px rgba(20,20,40,.05);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding:18px 16px 40px}
h1{font-size:20px}
.back{display:inline-flex;align-items:center;gap:4px;color:var(--sub);text-decoration:none;font-size:13px;margin-bottom:8px}
.card{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--shadow);margin-top:14px}
.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.score b{font-size:22px}
canvas{width:100%;background:#0f1220;border-radius:12px;display:block;touch-action:none}
.btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:15px;cursor:pointer;margin-top:12px}
.hint{font-size:12px;color:var(--sub)}
.over{text-align:center;color:var(--sub);font-size:14px;margin-top:10px;min-height:20px}
</style>
</head>
<body>
<div class="wrap">
<a class="back" href="index.html">← 返回分类表</a>
<h1>🐍 贪吃蛇</h1>
<div class="card">
  <div class="bar"><div class="score">得分 <b id="sc">0</b></div><button class="btn" id="restart">重新开始</button></div>
  <canvas id="cv" width="360" height="360"></canvas>
  <div class="over" id="over"></div>
  <p class="hint">电脑：方向键 / WASD。手机：在画面上滑动。吃到 🍎 变长，撞墙或撞自己结束。</p>
</div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const N=20, SIZE=cv.width/N;
let snake, dir, nextDir, food, score, timer, alive;
function reset(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};score=0;alive=true;
  document.getElementById('sc').textContent=0;
  document.getElementById('over').textContent='';
  placeFood();draw();
}
function placeFood(){do{food={x:Math.floor(Math.random()*N),y:Math.floor(Math.random()*N)};}while(snake.some(s=>s.x===food.x&&s.y===food.y));}
function step(){
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.y<0||head.x>=N||head.y>=N||snake.some(s=>s.x===head.x&&s.y===head.y)){end();return;}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){score++;document.getElementById('sc').textContent=score;placeFood();}
  else snake.pop();
  draw();
}
function draw(){
  ctx.fillStyle='#0f1220';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#16c47a';ctx.fillRect(food.x*SIZE+2,food.y*SIZE+2,SIZE-4,SIZE-4);
  snake.forEach((s,i)=>{ctx.fillStyle=i===0?'#fbbf24':'#4ade80';ctx.fillRect(s.x*SIZE+1,s.y*SIZE+1,SIZE-2,SIZE-2);});
}
function end(){alive=false;clearInterval(timer);document.getElementById('over').textContent='游戏结束 · 得分 '+score+'（点重新开始再来）';}
function setDir(x,y){if(x===-dir.x&&y===-dir.y)return;nextDir={x,y};}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'||e.key==='w')setDir(0,-1);
  else if(e.key==='ArrowDown'||e.key==='s')setDir(0,1);
  else if(e.key==='ArrowLeft'||e.key==='a')setDir(-1,0);
  else if(e.key==='ArrowRight'||e.key==='d')setDir(1,0);
});
let ts=null;
cv.addEventListener('touchstart',e=>{ts={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
cv.addEventListener('touchend',e=>{
  if(!ts)return;const t=e.changedTouches[0];const dx=t.clientX-ts.x,dy=t.clientY-ts.y;
  if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?1:-1,0);else setDir(0,dy>0?1:-1);
  ts=null;
},{passive:true});
document.getElementById('restart').onclick=()=>{clearInterval(timer);reset();timer=setInterval(()=>{if(alive)step();},110);};
reset();timer=setInterval(()=>{if(alive)step();},110);
</script>
</body></html>
