<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>打砖块 · Breakout</title>
<style>
:root{--bg:#f4f5f9;--card:#fff;--text:#1f2430;--sub:#7b8190;--accent:#4f46e5;--soft:#eef2ff;--shadow:0 1px 3px rgba(20,20,40,.06),0 6px 18px rgba(20,20,40,.05);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding:18px 16px 40px}
.bar a{color:var(--sub);text-decoration:none;font-size:14px}
h1{font-size:20px;margin-top:2px}.sub{color:var(--sub);font-size:13px}
.card{background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-top:14px}
canvas{display:block;width:100%;height:auto;background:#0f1220;border-radius:12px;touch-action:none}
.score{display:flex;justify-content:space-around;text-align:center;margin-top:10px}
.score b{font-size:20px;display:block}.score span{color:var(--sub);font-size:12px}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:10px}
.btn{border:0;background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:10px 16px;border-radius:10px;cursor:pointer}
.msg{color:var(--sub);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar"><a href="index.html">← 游戏厅</a></div>
  <h1>🧱 打砖块 Breakout</h1>
  <p class="sub">拖动屏幕（或 ← → 键）移动挡板，接住球打光所有砖块。</p>

  <div class="card">
    <canvas id="cv" width="360" height="440"></canvas>
    <div class="score">
      <div><b id="score">0</b><span>得分</span></div>
      <div><b id="lives">3</b><span>生命</span></div>
      <div><b id="lv">1</b><span>关卡</span></div>
    </div>
    <div class="row">
      <button class="btn" id="start">开始 / 重开</button>
      <span class="msg" id="msg">点开始</span>
    </div>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
const PW=68,PH=12,BR=6;
const ROWS=5,COLS=8,BW=W/COLS,BH=20,TOP=40;
const COLORS=['#ff5c72','#f5a623','#f6d000','#37d67a','#4f6bff'];
let px,ball,bricks,score,lives,lv,run,raf,launched;
function initBricks(){
  bricks=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)bricks.push({x:c*BW,y:TOP+r*BH,alive:true,color:COLORS[r%COLORS.length]});
}
function resetBall(){launched=false;ball={x:W/2,y:H-40,vx:0,vy:0,speed:4+ (lv-1)*0.6};px=W/2-PW/2;}
function start(){score=0;lives=3;lv=1;initBricks();resetBall();run=true;updateHud();document.getElementById('msg').textContent='拖动挡板接球';if(raf)cancelAnimationFrame(raf);loop();}
function launch(){if(launched)return;launched=true;const ang=(-Math.PI/2)+(Math.random()*0.6-0.3);ball.vx=ball.speed*Math.cos(ang);ball.vy=ball.speed*Math.sin(ang);}
function updateHud(){document.getElementById('score').textContent=score;document.getElementById('lives').textContent=lives;document.getElementById('lv').textContent=lv;}
function loop(){
  if(!run)return;
  const py=H-24;
  if(!launched){ball.x=px+PW/2;ball.y=py-BR-2;}
  else{
    ball.x+=ball.vx;ball.y+=ball.vy;
    if(ball.x<BR){ball.x=BR;ball.vx*=-1;}
    if(ball.x>W-BR){ball.x=W-BR;ball.vx*=-1;}
    if(ball.y<BR){ball.y=BR;ball.vy*=-1;}
    // 挡板
    if(ball.y+BR>=py&&ball.y+BR<=py+PH+8&&ball.x>px&&ball.x<px+PW&&ball.vy>0){
      const off=(ball.x-(px+PW/2))/(PW/2);const ang=off*(Math.PI/3);
      ball.vx=ball.speed*Math.sin(ang);ball.vy=-ball.speed*Math.cos(ang);
    }
    // 砖块
    for(const b of bricks){
      if(!b.alive)continue;
      if(ball.x>b.x&&ball.x<b.x+BW-2&&ball.y-BR<b.y+BH-2&&ball.y+BR>b.y){
        b.alive=false;ball.vy*=-1;score+=10;updateHud();
        if(bricks.every(k=>!k.alive)){lv++;initBricks();resetBall();document.getElementById('msg').textContent='过关！进入第 '+lv+' 关';}
        break;
      }
    }
    if(ball.y>H){
      lives--;updateHud();
      if(lives<=0){run=false;document.getElementById('msg').textContent='💥 游戏结束 · 得分 '+score;draw();return;}
      resetBall();document.getElementById('msg').textContent='还剩 '+lives+' 条命，继续';
    }
  }
  draw();raf=requestAnimationFrame(loop);
}
function draw(){
  ctx.fillStyle='#0f1220';ctx.fillRect(0,0,W,H);
  bricks.forEach(b=>{if(b.alive){ctx.fillStyle=b.color;ctx.fillRect(b.x+2,b.y+2,BW-4,BH-4);}});
  const py=H-24;ctx.fillStyle='#fff';ctx.fillRect(px,py,PW,PH);
  ctx.beginPath();ctx.arc(ball.x,ball.y,BR,0,Math.PI*2);ctx.fillStyle='#ffd166';ctx.fill();
}
function movePaddle(x){const r=cv.getBoundingClientRect();const lx=(x-r.left)*(W/r.width);px=Math.max(0,Math.min(W-PW,lx-PW/2));if(!launched)launch();}
cv.addEventListener('pointermove',e=>{if(run)movePaddle(e.clientX);});
cv.addEventListener('pointerdown',e=>{if(run){movePaddle(e.clientX);launch();}});
cv.addEventListener('touchmove',e=>{if(run){movePaddle(e.touches[0].clientX);}e.preventDefault();},{passive:false});
document.addEventListener('keydown',e=>{
  if(!run)return;
  if(e.key==='ArrowLeft'){px=Math.max(0,px-24);launch();}
  else if(e.key==='ArrowRight'){px=Math.min(W-PW,px+24);launch();}
  else if(e.key===' '){launch();e.preventDefault();}
});
document.getElementById('start').onclick=start;
initBricks();resetBall();lv=1;score=0;lives=3;draw();
</script>
<script src="ads.js"></script>
</body></html>
