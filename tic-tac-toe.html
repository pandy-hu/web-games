<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>井字棋 · 人机对战</title>
<style>
:root{--bg:#f4f5f9;--card:#fff;--text:#1f2430;--sub:#7b8190;--accent:#4f46e5;--soft:#eef2ff;--line:#ebedf2;--shadow:0 1px 3px rgba(20,20,40,.06),0 6px 18px rgba(20,20,40,.05);--x:#e23b3b;--o:#4f46e5;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding:22px 16px 60px}
.bar{display:flex;align-items:center;gap:10px}
.bar a{color:var(--sub);text-decoration:none;font-size:14px}
h1{font-size:20px}
.sub{color:var(--sub);font-size:13px;margin-top:2px}
.card{background:var(--card);border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-top:16px}
.seg{display:inline-flex;background:var(--soft);border-radius:10px;padding:3px;gap:3px}
.seg button{border:0;background:transparent;color:var(--sub);font-weight:600;font-size:13px;padding:6px 12px;border-radius:8px;cursor:pointer}
.seg button.on{background:#fff;color:var(--accent);box-shadow:0 1px 2px rgba(20,20,40,.1)}
.status{text-align:center;font-size:16px;font-weight:700;margin:12px 0;min-height:24px}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;aspect-ratio:1/1}
.cell{background:var(--soft);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:54px;font-weight:800;cursor:pointer;user-select:none;transition:transform .08s,background .15s}
.cell:active{transform:scale(.96)}
.cell.x{color:var(--x)}.cell.o{color:var(--o)}
.cell.win{background:#fff4d6}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:10px}
.btn{border:0;background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:10px 16px;border-radius:10px;cursor:pointer}
.btn.ghost{background:var(--soft);color:var(--accent)}
.score{display:flex;justify-content:space-around;text-align:center;margin-top:6px}
.score b{font-size:20px;display:block}.score span{color:var(--sub);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar"><a href="index.html">← 游戏厅</a></div>
  <h1>⭕ 井字棋 · 人机对战</h1>
  <p class="sub">你执 ✕，AI 执 ◯。选难度，先连成一线者胜。</p>

  <div class="card">
    <div class="seg" id="diff">
      <button data-d="easy">简单（随机）</button>
      <button data-d="hard" class="on">无敌（AI）</button>
    </div>
    <div class="score">
      <div><b id="sw">0</b><span>你胜</span></div>
      <div><b id="sd">0</b><span>平局</span></div>
      <div><b id="sl">0</b><span>AI 胜</span></div>
    </div>
    <div class="status" id="status">轮到你了</div>
    <div class="board" id="board"></div>
    <div class="row">
      <button class="btn ghost" id="reset">重新开始</button>
      <span class="sub" id="first">你先手</span>
    </div>
  </div>
</div>
<script>
const WIN=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let board=[],over=true,diff='hard',lock=false;
let sc={w:0,d:0,l:0};
const boardEl=document.getElementById('board');
const statusEl=document.getElementById('status');
const cells=[];
for(let i=0;i<9;i++){const c=document.createElement('div');c.className='cell';c.onclick=()=>move(i);boardEl.appendChild(c);cells.push(c);}

document.getElementById('diff').onclick=e=>{
  const b=e.target.closest('button');if(!b)return;
  diff=b.dataset.d;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  reset();
};
document.getElementById('reset').onclick=reset;

function render(){
  board.forEach((v,i)=>{cells[i].textContent=v==='X'?'✕':v==='O'?'◯':'';cells[i].className='cell '+(v==='X'?'x':v==='O'?'o':'');});
}
function winner(b){
  for(const [a,c,d] of WIN){if(b[a]&&b[a]===b[c]&&b[a]===b[d])return {p:b[a],line:[a,c,d]};}
  if(b.every(x=>x))return {p:'draw'};
  return null;
}
function move(i){
  if(over||lock||board[i])return;
  board[i]='X';render();
  const r=winner(board);
  if(r){finish(r);return;}
  lock=true;statusEl.textContent='AI 思考中…';
  setTimeout(()=>{aiMove();lock=false;},380);
}
function aiMove(){
  let i;
  if(diff==='easy'){
    const e=board.map((v,k)=>v?-1:k).filter(k=>k>=0);
    i=e[Math.floor(Math.random()*e.length)];
  }else{ i=bestMove(); }
  if(i==null)return;
  board[i]='O';render();
  const r=winner(board);
  if(r){finish(r);return;}
  statusEl.textContent='轮到你了';
}
function bestMove(){
  let best=-2,idx=null;
  for(let i=0;i<9;i++){if(board[i])continue;board[i]='O';const s=mini('X',0);board[i]=null;if(s>best){best=s;idx=i;}}
  return idx;
}
function mini(player,depth){
  const r=winner(board);
  if(r){return r.p==='O'?10-depth:r.p==='X'?depth-10:0;}
  let best=player==='O'?-99:99;
  for(let i=0;i<9;i++){if(board[i])continue;board[i]=player;const s=mini(player==='O'?'X':'O',depth+1);board[i]=null;best=player==='O'?Math.max(best,s):Math.min(best,s);}
  return best;
}
function finish(r){
  over=true;
  if(r.line){r.line.forEach(i=>cells[i].classList.add('win'));}
  if(r.p==='X'){sc.w++;statusEl.textContent='🎉 你赢了！';}
  else if(r.p==='O'){sc.l++;statusEl.textContent='AI 赢了，再来一局？';}
  else{sc.d++;statusEl.textContent='平局！';}
  document.getElementById('sw').textContent=sc.w;
  document.getElementById('sd').textContent=sc.d;
  document.getElementById('sl').textContent=sc.l;
}
function reset(){
  board=Array(9).fill(null);over=false;lock=false;render();
  statusEl.textContent='轮到你了';
  [...cells].forEach(c=>c.classList.remove('win'));
}
reset();
</script>
</body></html>
