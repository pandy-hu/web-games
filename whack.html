<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1,user-scalable=no">
<title>打地鼠</title>
<style>
:root{--bg:#f4f5f9;--card:#fff;--text:#1f2430;--sub:#7b8190;--accent:#4f46e5;--soft:#eef2ff;--line:#ebedf2;--shadow:0 1px 3px rgba(20,20,40,.06),0 6px 18px rgba(20,20,40,.05);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding:18px 16px 40px}
h1{font-size:20px}
.back{display:inline-flex;align-items:center;gap:4px;color:var(--sub);text-decoration:none;font-size:13px;margin-bottom:8px}
.card{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--shadow);margin-top:14px}
.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.score b{font-size:22px}
.btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:15px;cursor:pointer;margin-top:12px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
.hole{aspect-ratio:1/1;background:#d9c3a3;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:44px;cursor:pointer;user-select:none;overflow:hidden}
.hole .mole{transform:translateY(130%);transition:transform .12s;display:block}
.hole.up .mole{transform:translateY(0)}
.hint{font-size:12px;color:var(--sub);margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
<a class="back" href="index.html">← 返回分类表</a>
<h1>🔨 打地鼠</h1>
<div class="card">
  <div class="bar"><div class="score">得分 <b id="sc">0</b></div><div class="score">时间 <b id="tm">30</b>s</div></div>
  <button class="btn" id="start">开始游戏</button>
  <div class="grid" id="grid"></div>
  <p class="hint">地鼠冒头时点它得分，30 秒挑战最高分。手速越快分越高。</p>
</div>
</div>
<script>
const grid=document.getElementById('grid');
let holes=[],score=0,time=30,running=false,timer,spawn;
for(let i=0;i<9;i++){const h=document.createElement('div');h.className='hole';h.innerHTML='<span class="mole">🐹</span>';h.onclick=()=>hit(i);grid.appendChild(h);holes.push(h);}
function hit(i){if(!running)return;if(holes[i].classList.contains('up')){score++;document.getElementById('sc').textContent=score;holes[i].classList.remove('up');}}
function pop(){if(!running)return;const i=Math.floor(Math.random()*9);if(!holes[i].classList.contains('up')){holes[i].classList.add('up');setTimeout(()=>holes[i].classList.remove('up'),700);}}
function tick(){time--;document.getElementById('tm').textContent=time;if(time<=0)end();}
function start(){if(running)return;running=true;score=0;time=30;document.getElementById('sc').textContent=0;document.getElementById('tm').textContent=30;timer=setInterval(tick,1000);spawn=setInterval(pop,650);document.getElementById('start').textContent='进行中…';}
function end(){running=false;clearInterval(timer);clearInterval(spawn);holes.forEach(h=>h.classList.remove('up'));document.getElementById('start').textContent='再来一局';alert('时间到！得分 '+score);}
document.getElementById('start').onclick=()=>{if(!running)start();};
</script>
</body></html>
