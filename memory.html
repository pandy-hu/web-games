<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1,user-scalable=no">
<title>记忆翻牌</title>
<style>
:root{--bg:#f4f5f9;--card:#fff;--text:#1f2430;--sub:#7b8190;--accent:#4f46e5;--soft:#eef2ff;--line:#ebedf2;--shadow:0 1px 3px rgba(20,20,40,.06),0 6px 18px rgba(20,20,40,.05);--green:#15a86b;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding:18px 16px 40px}
h1{font-size:20px}
.back{display:inline-flex;align-items:center;gap:4px;color:var(--sub);text-decoration:none;font-size:13px;margin-bottom:8px}
.card{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--shadow);margin-top:14px}
.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.score b{font-size:20px}
.btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:15px;cursor:pointer;margin-top:12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.tile{aspect-ratio:1/1;border-radius:10px;background:var(--soft);display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;user-select:none;transition:transform .15s}
.tile.flip{background:#fff;box-shadow:inset 0 0 0 2px var(--accent)}
.tile.done{background:#e7f7ef;cursor:default}
.hint{font-size:12px;color:var(--sub);margin-top:10px}
.win{text-align:center;color:var(--green);font-weight:700;min-height:20px;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
<a class="back" href="index.html">← 返回分类表</a>
<h1>🎴 记忆翻牌</h1>
<div class="card">
  <div class="bar"><div class="score">步数 <b id="mv">0</b> · 配对 <b id="pairs">0</b>/8</div><button class="btn" id="restart">重新开始</button></div>
  <div class="grid" id="grid"></div>
  <div class="win" id="win"></div>
  <p class="hint">点开两张牌，相同则保留，不同则翻回。记住位置，用最少步数配对全部。</p>
</div>
</div>
<script>
const EMO=['🍎','🍌','🍇','🍉','🍓','🍒','🥝','🍑'];
let deck, first, lock, moves, matched;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function newGame(){deck=shuffle([...EMO,...EMO]).map(e=>({e}));first=null;lock=false;moves=0;matched=0;document.getElementById('mv').textContent=0;document.getElementById('pairs').textContent=0;document.getElementById('win').textContent='';render();}
function render(){
  const g=document.getElementById('grid');g.innerHTML='';
  deck.forEach((c,idx)=>{
    const t=document.createElement('div');t.className='tile'+(c.open?' flip':'')+(c.matched?' done':'');t.textContent=c.open||c.matched?c.e:'?';
    t.onclick=()=>flip(idx);
    g.appendChild(t);
  });
}
function flip(idx){
  if(lock)return;const c=deck[idx];if(c.open||c.matched)return;
  c.open=true;moves++;document.getElementById('mv').textContent=moves;render();
  if(first===null){first=idx;return;}
  if(deck[first].e===c.e){deck[first].matched=deck[idx].matched=true;matched++;document.getElementById('pairs').textContent=matched;first=null;if(matched===EMO.length)document.getElementById('win').textContent='🎉 全部配对！用了 '+moves+' 步';render();}
  else{lock=true;const f=first;first=null;setTimeout(()=>{deck[f].open=deck[idx].open=false;lock=false;render();},700);}
}
document.getElementById('restart').onclick=newGame;
newGame();
</script>
<script src="ads.js"></script>
</body></html>
