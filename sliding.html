<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>滑块拼图 · Sliding Puzzle</title>
<style>
:root{--bg:#f4f5f9;--card:#fff;--text:#1f2430;--sub:#7b8190;--accent:#4f46e5;--soft:#eef2ff;--shadow:0 1px 3px rgba(20,20,40,.06),0 6px 18px rgba(20,20,40,.05);--green:#15a86b;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding:18px 16px 40px}
.bar a{color:var(--sub);text-decoration:none;font-size:14px}
h1{font-size:20px;margin-top:2px}.sub{color:var(--sub);font-size:13px}
.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-top:14px}
.opts{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.seg{display:inline-flex;background:var(--soft);border-radius:10px;padding:3px;gap:3px}
.seg button{border:0;background:transparent;color:var(--sub);font-weight:600;font-size:13px;padding:6px 11px;border-radius:8px;cursor:pointer}
.seg button.on{background:#fff;color:var(--accent);box-shadow:0 1px 2px rgba(20,20,40,.1)}
.grid{display:grid;gap:6px;aspect-ratio:1/1;background:#dfe3ee;border-radius:12px;padding:6px}
.tile{background:var(--accent);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;cursor:pointer;user-select:none;transition:transform .08s}
.tile:active{transform:scale(.96)}
.tile.blank{background:transparent;cursor:default}
.tile.emoji{background:var(--soft)}
.score{display:flex;justify-content:space-around;text-align:center;margin-top:12px}
.score b{font-size:20px;display:block}.score span{color:var(--sub);font-size:12px}
.status{text-align:center;font-weight:800;color:var(--green);min-height:22px;margin-top:8px}
.btn{margin-top:12px;width:100%;border:0;background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:11px;border-radius:10px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar"><a href="index.html">← 游戏厅</a></div>
  <h1>🧩 滑块拼图 Sliding Puzzle</h1>
  <p class="sub">点击空格旁的方块使其滑入，把数字/图案复原到顺序。</p>

  <div class="card">
    <div class="opts">
      <div class="seg" id="size">
        <button data-n="3" class="on">3×3</button>
        <button data-n="4">4×4</button>
      </div>
      <div class="seg" id="mode">
        <button data-m="num" class="on">数字</button>
        <button data-m="emoji">图案</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="score">
      <div><b id="moves">0</b><span>步数</span></div>
      <div><b id="time">0s</b><span>用时</span></div>
    </div>
    <div class="status" id="status"></div>
    <button class="btn" id="shuffle">打乱开始</button>
  </div>
</div>
<script>
let n=3,mode='num',tiles=[],blank,moves,timer,sec,started;
const EMO=['🍎','🍌','🍇','🍊','🍓','🍑','🍒','🥝','🍍','🥥','🍉','🍈','🍋','🫐','🥭'];
const grid=document.getElementById('grid');
document.getElementById('size').onclick=e=>{const b=e.target.closest('button');if(!b)return;n=+b.dataset.n;[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));build();};
document.getElementById('mode').onclick=e=>{const b=e.target.closest('button');if(!b)return;mode=b.dataset.m;[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));render();};
document.getElementById('shuffle').onclick=shuffle;

function build(){
  grid.style.gridTemplateColumns=`repeat(${n},1fr)`;
  tiles=[...Array(n*n-1).keys()].map(i=>i+1);tiles.push(0);blank=n*n-1;
  moves=0;sec=0;started=false;clearInterval(timer);
  document.getElementById('moves').textContent=0;document.getElementById('time').textContent='0s';
  document.getElementById('status').textContent='';
  render();
}
function render(){
  grid.innerHTML='';
  tiles.forEach((v,i)=>{
    const d=document.createElement('div');
    if(v===0){d.className='tile blank';}
    else{d.className='tile'+(mode==='emoji'?' emoji':'');d.textContent=mode==='emoji'?EMO[v-1]:v;d.onclick=()=>tryMove(i);}
    grid.appendChild(d);
  });
}
function tryMove(i){
  const br=Math.floor(blank/n),bc=blank%n,r=Math.floor(i/n),c=i%n;
  if((Math.abs(br-r)===1&&bc===c)||(Math.abs(bc-c)===1&&br===r)){
    if(!started){started=true;timer=setInterval(()=>{sec++;document.getElementById('time').textContent=sec+'s';},1000);}
    [tiles[i],tiles[blank]]=[tiles[blank],tiles[i]];blank=i;moves++;
    document.getElementById('moves').textContent=moves;render();check();
  }
}
function check(){
  const ok=tiles.slice(0,-1).every((v,i)=>v===i+1)&&tiles[tiles.length-1]===0;
  if(ok&&started){clearInterval(timer);document.getElementById('status').textContent=`🎉 完成！${moves} 步 · ${sec} 秒`;}
}
function shuffle(){
  build();
  // 随机走大量合法步，保证可解
  let b=blank;
  for(let k=0;k<n*n*80;k++){
    const nbs=[];const r=Math.floor(b/n),c=b%n;
    if(r>0)nbs.push(b-n);if(r<n-1)nbs.push(b+n);if(c>0)nbs.push(b-1);if(c<n-1)nbs.push(b+1);
    const t=nbs[Math.floor(Math.random()*nbs.length)];
    [tiles[t],tiles[b]]=[tiles[b],tiles[t]];b=t;
  }
  blank=b;moves=0;sec=0;started=false;
  document.getElementById('moves').textContent=0;document.getElementById('time').textContent='0s';
  document.getElementById('status').textContent='';render();
}
build();
</script>
</body></html>
